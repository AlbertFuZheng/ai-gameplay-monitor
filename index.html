<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>AI 游戏创新监控</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// Dynamic load daily-reports.js with cache-busting
(function(){
  var s = document.createElement('script');
  s.src = 'daily-reports.js?v=' + Date.now();
  s.onload = function() {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAll);
    } else {
      initAll();
    }
  };
  s.onerror = function() {
    window.DAILY_REPORTS = [];
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAll);
    } else {
      initAll();
    }
  };
  document.head.appendChild(s);
})();
</script>
<style>
/* ========== CSS Variables ========== */
:root {
  --bg-primary: #0F1923;
  --bg-secondary: #1A2634;
  --bg-tertiary: #243447;
  --blue: #4285F4;
  --red: #EA4335;
  --purple: #9B59B6;
  --text-primary: #FFFFFF;
  --text-secondary: #B0BEC5;
  --text-muted: #78909C;
  --border: #2C3E50;
  --nav-height: 60px;
}

/* ========== Reset & Base ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-secondary);
  overflow-x: hidden;
  min-height: 100vh;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }

/* ========== Navigation ========== */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: var(--nav-height);
  background: var(--bg-primary);
  border-bottom: 1px solid var(--bg-tertiary);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
}
.nav-logo {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; white-space: nowrap;
}
.nav-tabs { display: flex; gap: 4px; position: relative; }
.nav-tab {
  padding: 8px 20px; border: none; background: none;
  color: var(--text-muted); font-size: 14px; cursor: pointer;
  border-radius: 8px; transition: all 0.2s;
  font-family: inherit;
}
.nav-tab:hover { color: var(--text-secondary); background: rgba(66,133,244,0.08); }
.nav-tab.active {
  color: var(--text-primary);
  background: rgba(66,133,244,0.15);
}
.nav-tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--purple));
  border-radius: 1px;
}
.nav-tab-wrapper { position: relative; display: inline-flex; }
.nav-update {
  font-size: 12px; color: var(--text-muted); white-space: nowrap;
}

/* ========== Main Content ========== */
.main { padding-top: var(--nav-height); }
.view { display: none; }
.view.active { display: flex; flex-direction: column; }

/* ========== Bubble Chart View ========== */
.chart-view-scroll { overflow-y: auto; height: calc(100vh - var(--nav-height)); }
.chart-subtitle {
  text-align: center; padding: 12px 16px 4px;
  font-size: 13px; color: var(--text-muted);
}
.chart-container { position: relative; height: 60vh; min-height: 400px; }
#bubbleChart { width: 100%; height: 100%; }

/* ========== Product Table ========== */
.product-table-section {
  padding: 0 24px 32px;
  border-top: 1px solid var(--bg-tertiary);
}
.product-table-title {
  font-size: 15px; font-weight: 600; color: var(--text-primary);
  padding: 16px 0 12px;
  display: flex; align-items: center; gap: 8px;
}
.product-table-wrap { overflow-x: auto; }
.product-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
  min-width: 800px;
}
.product-table th {
  text-align: left; padding: 10px 12px;
  background: var(--bg-secondary); color: var(--text-muted);
  font-weight: 600; white-space: nowrap;
  border-bottom: 1px solid var(--bg-tertiary);
  cursor: pointer; user-select: none;
  position: sticky; top: 0; z-index: 2;
}
.product-table th:hover { color: var(--text-primary); background: var(--bg-tertiary); }
.product-table th .sort-icon {
  display: inline-block; margin-left: 4px; font-size: 10px;
  color: var(--text-muted); transition: color 0.15s;
}
.product-table th.sorted-asc .sort-icon,
.product-table th.sorted-desc .sort-icon { color: var(--blue); }
.product-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--bg-tertiary);
  vertical-align: top; color: var(--text-secondary);
}
.product-table tr:hover td { background: rgba(66,133,244,0.05); }
.product-table .td-name {
  color: var(--text-primary); font-weight: 600; white-space: nowrap;
  cursor: pointer;
}
.product-table .td-name:hover { color: var(--blue); }
.product-table .td-game { color: var(--text-muted); white-space: nowrap; }
.product-table .td-num { text-align: center; font-weight: 600; }
.product-table .td-desc { max-width: 240px; font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.product-table .td-comment { max-width: 200px; font-size: 12px; color: var(--text-muted); line-height: 1.5; }
.td-influence-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600;
}
.td-type-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 4px; vertical-align: middle;
}
.td-status-badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px;
  font-size: 11px; background: var(--bg-tertiary);
}

/* ========== Legend ========== */
.chart-legend {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 24px;
  padding: 10px 16px 14px; border-top: 1px solid var(--bg-tertiary);
}
.legend-group { display: flex; align-items: center; gap: 12px; }
.legend-label { font-size: 11px; color: var(--text-muted); margin-right: 4px; font-weight: 600; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
.legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.legend-dot.blue { background: var(--blue); }
.legend-dot.red { background: var(--red); }
.legend-dot.purple { background: var(--purple); }
.legend-dot.solid { border: 2px solid var(--text-muted); background: transparent; }
.legend-dot.dashed { border: 2px dashed var(--text-muted); background: transparent; }
.legend-dot.size-s { width: 8px; height: 8px; background: var(--text-muted); }
.legend-dot.size-m { width: 14px; height: 14px; background: var(--text-muted); }
.legend-dot.size-l { width: 20px; height: 20px; background: var(--text-muted); }
.legend-dot.size-h { width: 26px; height: 26px; background: var(--text-muted); }

/* ========== Comment Panel ========== */
.comment-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
}
.comment-overlay.active { display: block; }
.comment-panel {
  position: fixed; z-index: 201;
  background: rgba(15,25,35,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-left: 1px solid var(--bg-tertiary);
  display: flex; flex-direction: column;
  transition: transform 0.3s ease;
}
/* PC */
@media (min-width: 768px) {
  .comment-panel {
    top: 0; right: 0; bottom: 0; width: 380px;
    border-radius: 16px 0 0 16px;
    transform: translateX(100%);
  }
  .comment-panel.open { transform: translateX(0); }
}
/* Mobile */
@media (max-width: 767px) {
  .comment-panel {
    left: 0; right: 0; bottom: 0; height: 70vh;
    border-radius: 16px 16px 0 0;
    border-left: none; border-top: 1px solid var(--bg-tertiary);
    transform: translateY(100%);
  }
  .comment-panel.open { transform: translateY(0); }
}

.comment-header {
  padding: 20px 20px 12px; border-bottom: 1px solid var(--bg-tertiary);
}
.comment-header-top {
  display: flex; justify-content: space-between; align-items: flex-start;
}
.comment-product-name { font-size: 18px; font-weight: 700; color: var(--text-primary); }
.comment-product-game { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.comment-close {
  width: 32px; height: 32px; border: none; background: var(--bg-tertiary);
  color: var(--text-muted); border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  transition: all 0.2s; flex-shrink: 0;
}
.comment-close:hover { background: var(--border); color: var(--text-primary); }

.comment-scores {
  display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
}
.comment-image { margin-top: 12px; }
.comment-image img {
  width: 100%; border-radius: 8px; max-height: 180px; object-fit: cover;
  background: var(--bg-tertiary);
}
.comment-links {
  margin-top: 10px; padding-bottom: 4px;
}
.comment-links a {
  display: block; padding: 6px 0; font-size: 13px; color: var(--blue);
  border-bottom: 1px solid var(--bg-tertiary); line-height: 1.5;
}
.comment-links a:last-child { border-bottom: none; }
.comment-links a:hover { color: #82b1ff; }
.comment-links .link-summary {
  font-size: 11px; color: var(--text-muted); margin-left: 4px;
}
.score-badge {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 6px;
  background: var(--bg-tertiary); font-size: 11px; color: var(--text-secondary);
}
.score-badge .dot { width: 6px; height: 6px; border-radius: 50%; }

.comment-list {
  flex: 1; overflow-y: auto; padding: 16px 20px;
}
.comment-empty {
  text-align: center; padding: 40px 20px;
  color: var(--text-muted); font-size: 13px;
}
.comment-item {
  padding: 12px 0; border-bottom: 1px solid var(--bg-tertiary);
  position: relative;
}
.comment-item:last-child { border-bottom: none; }
.comment-time { font-size: 11px; color: var(--text-muted); }
.comment-text { font-size: 14px; color: var(--text-secondary); margin-top: 4px; line-height: 1.6; }
.comment-delete {
  position: absolute; top: 12px; right: 0;
  width: 24px; height: 24px; border: none; background: none;
  color: var(--text-muted); cursor: pointer; font-size: 14px; opacity: 0;
  transition: opacity 0.2s; border-radius: 4px;
}
.comment-item:hover .comment-delete { opacity: 1; }
.comment-delete:hover { color: var(--red); background: rgba(234,67,53,0.1); }

.comment-input-area {
  padding: 12px 20px 20px;
  border-top: 1px solid var(--bg-tertiary);
  display: flex; gap: 8px;
}
.comment-textarea {
  flex: 1; background: var(--bg-tertiary); border: 1px solid transparent;
  border-radius: 8px; padding: 10px 12px; color: var(--text-primary);
  font-size: 13px; font-family: inherit; resize: none; min-height: 44px;
  max-height: 120px; transition: border-color 0.2s;
}
.comment-textarea:focus { outline: none; border-color: var(--blue); }
.comment-textarea::placeholder { color: var(--text-muted); }
.comment-submit {
  padding: 8px 16px; background: var(--blue); color: white;
  border: none; border-radius: 8px; font-size: 13px; cursor: pointer;
  font-family: inherit; transition: background 0.2s; align-self: flex-end;
}
.comment-submit:hover { background: #3367D6; }

/* ========== Daily Report View ========== */
#view-report { height: calc(100vh - var(--nav-height)); flex-direction: row; }
#view-report .report-content { overflow-y: auto; }

.report-sidebar {
  width: 220px; background: var(--bg-secondary);
  border-right: 1px solid var(--bg-tertiary);
  overflow-y: auto; flex-shrink: 0;
}
.report-sidebar-title {
  padding: 16px 16px 12px; font-size: 13px; font-weight: 600;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
}
.report-date-item {
  padding: 10px 16px; cursor: pointer; font-size: 14px;
  color: var(--text-muted); transition: all 0.15s;
  border-left: 3px solid transparent;
}
.report-date-item:hover { background: var(--bg-tertiary); color: var(--text-secondary); }
.report-date-item.active {
  background: var(--bg-tertiary); color: var(--text-primary);
  border-left-color: var(--blue);
}

.report-content {
  flex: 1; overflow-y: auto; padding: 24px;
}
.report-content-inner {
  max-width: 800px; margin: 0 auto;
}

/* Mobile date selector */
.report-mobile-select {
  display: none; padding: 12px 16px;
  background: var(--bg-secondary); border-bottom: 1px solid var(--bg-tertiary);
}
.report-mobile-select select {
  width: 100%; padding: 8px 12px; background: var(--bg-tertiary);
  color: var(--text-primary); border: 1px solid var(--border);
  border-radius: 8px; font-size: 14px; font-family: inherit;
}

.report-empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; color: var(--text-muted);
}
.report-empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
.report-empty-text { font-size: 15px; }
.report-empty-sub { font-size: 13px; margin-top: 6px; }

/* ========== Markdown Rendered Styles ========== */
.md-content h1 {
  font-size: 24px; color: var(--text-primary); font-weight: 700;
  padding-bottom: 12px; margin-bottom: 20px;
  border-bottom: 2px solid;
  border-image: linear-gradient(90deg, var(--blue), var(--purple)) 1;
}
.md-content h2 {
  font-size: 18px; color: var(--text-primary); font-weight: 600;
  margin: 24px 0 12px;
}
.md-content h3 {
  font-size: 15px; color: var(--blue); font-weight: 600;
  margin: 16px 0 8px;
}
.md-content h3 a { color: inherit; text-decoration: none; }
.md-content h3 a:hover { text-decoration: underline; }
.news-meta {
  display: flex; align-items: center; gap: 12px;
  font-size: 12px; color: var(--text-muted); margin: 2px 0 8px; padding-left: 2px;
}
.news-source::before { content: '📰 '; }
.news-date::before { content: '🕐 '; }
.news-lang { padding: 1px 6px; border-radius: 3px; background: rgba(66,133,244,0.15); font-size: 11px; }
.md-content p { margin: 8px 0; line-height: 1.7; font-size: 14px; }
.md-content strong { color: var(--text-primary); }
.md-content ul, .md-content ol { padding-left: 20px; margin: 8px 0; }
.md-content li { margin: 4px 0; line-height: 1.6; font-size: 14px; }
.md-content li::marker { color: var(--blue); }
.md-content blockquote {
  border-left: 3px solid var(--blue); padding: 8px 16px;
  background: var(--bg-secondary); margin: 12px 0; border-radius: 0 8px 8px 0;
}
.md-content hr { border: none; border-top: 1px solid var(--bg-tertiary); margin: 20px 0; }
.md-content a { color: var(--blue); }
.md-content a:hover { text-decoration: underline; }
.md-content code {
  background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;
  font-size: 13px; color: var(--red);
}

/* ========== Insight Toggle (策划启发折叠) ========== */
.insight-toggle {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--text-muted); cursor: pointer;
  padding: 3px 10px; margin: 4px 0 2px;
  background: var(--bg-secondary); border: 1px solid var(--bg-tertiary);
  border-radius: 6px; transition: all 0.2s; user-select: none;
}
.insight-toggle:hover { color: var(--purple); border-color: var(--purple); background: rgba(171,71,188,0.08); }
.insight-toggle .arrow { display: inline-block; transition: transform 0.2s; font-size: 10px; }
.insight-toggle.open .arrow { transform: rotate(90deg); }
.insight-box {
  display: none; margin: 4px 0 8px; padding: 10px 14px;
  background: linear-gradient(135deg, rgba(171,71,188,0.06), rgba(66,133,244,0.06));
  border-left: 3px solid var(--purple); border-radius: 0 8px 8px 0;
  font-size: 13px; line-height: 1.7; color: var(--text-secondary);
  animation: insightFadeIn 0.25s ease;
}
.insight-box.show { display: block; }
@keyframes insightFadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* --- Mobile Date Navigation Bar (default hidden, shown in mobile media query) --- */
.report-mobile-nav {
  display: none;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  gap: 6px; padding: 10px 12px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--bg-tertiary);
  flex-shrink: 0; flex-wrap: nowrap;
}
.report-mobile-nav::-webkit-scrollbar { display: none; }
.report-mobile-nav { scrollbar-width: none; }
.date-pill {
  flex-shrink: 0; padding: 6px 14px;
  border-radius: 20px; font-size: 12px; white-space: nowrap;
  color: var(--text-muted); background: var(--bg-tertiary);
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.15s; user-select: none;
}
.date-pill:hover { color: var(--text-secondary); background: rgba(66,133,244,0.1); }
.date-pill.active {
  color: #fff; background: var(--blue);
  border-color: var(--blue); font-weight: 600;
}

/* ========== Responsive ========== */
@media (max-width: 767px) {
  .nav-logo { font-size: 15px; }
  .nav-tab { padding: 6px 14px; font-size: 13px; }
  .nav-update { display: none; }
  .report-sidebar { display: none; }
  .report-mobile-select { display: none; }
  .report-mobile-nav { display: flex; }
  .report-content { padding: 16px; }
  .chart-subtitle { font-size: 12px; padding: 8px 12px 2px; }
  .chart-legend { gap: 12px; padding: 8px 12px 10px; }
  .legend-group { gap: 8px; }

  /* --- Product Table mobile: compact layout --- */
  .product-table-section { padding: 0 8px 24px; }
  .product-table { min-width: unset; font-size: 12px; }
  .product-table th, .product-table td { padding: 8px 6px; white-space: nowrap; }
  /* Hide columns: game, buzz, users, comment */
  .product-table .td-game,
  .product-table .td-buzz,
  .product-table .td-users,
  .product-table .td-comment { display: none; }
  .product-table th[data-sort="game"],
  .product-table th[data-sort="buzz"],
  .product-table th[data-sort="users"],
  .product-table th:last-child { display: none; }
  /* Desc column: allow wrap, clamp to 2 lines */
  .product-table .td-desc { min-width: 250px; max-width: 320px; white-space: normal;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; text-overflow: ellipsis;
  }

  /* --- Report view column layout --- */
  #view-report { flex-direction: column; }
}
</style>
</head>
<body>

<!-- ========== Navigation ========== -->
<nav class="navbar">
  <div class="nav-logo">🎮 AI 游戏创新监控</div>
  <div class="nav-tabs">
    <div class="nav-tab-wrapper">
      <button class="nav-tab active" onclick="switchView('chart')" id="tab-chart">产品全景图</button>
    </div>
    <div class="nav-tab-wrapper">
      <button class="nav-tab" onclick="switchView('report')" id="tab-report">每日日报</button>
    </div>
  </div>
  <div class="nav-update" id="lastUpdate">最后更新：--</div>
</nav>

<!-- ========== Main Content ========== -->
<div class="main">

  <!-- ===== Chart View ===== -->
  <div class="view active" id="view-chart">
    <div class="chart-view-scroll">
      <div class="chart-container">
        <div id="bubbleChart"></div>
      </div>
      <div class="chart-legend">
      <div class="legend-group">
        <span class="legend-label">颜色</span>
        <span class="legend-item"><span class="legend-dot" style="background:#D4915C"></span>AI原生游戏</span>
        <span class="legend-item"><span class="legend-dot" style="background:#4285F4"></span>现有游戏+AI</span>
      </div>
    </div>

      <!-- ===== Product Table ===== -->
      <div class="product-table-section">
        <div class="product-table-title">📋 产品列表（点击表头排序）</div>
        <div class="product-table-wrap">
          <table class="product-table" id="productTable">
            <thead>
              <tr>
                <th data-sort="name" data-type="string">产品名 <span class="sort-icon">⇅</span></th>
                <th data-sort="game" data-type="string">所属游戏 <span class="sort-icon">⇅</span></th>
                <th data-sort="ai_core" data-type="number">AI核心 <span class="sort-icon">⇅</span></th>
                <th data-sort="buzz" data-type="number">讨论度 <span class="sort-icon">⇅</span></th>
                <th data-sort="users" data-type="influence">用户量 <span class="sort-icon">⇅</span></th>
                <th data-sort="category" data-type="string">分类 <span class="sort-icon">⇅</span></th>
                <th data-sort="status" data-type="string">状态 <span class="sort-icon">⇅</span></th>
                <th data-sort="launch" data-type="string">上线时间 <span class="sort-icon">⇅</span></th>
                <th>简介</th>
                <th>最新评论</th>
              </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Report View ===== -->
  <div class="view" id="view-report">
    <div class="report-mobile-select">

const USERS_BASE = { small: 22, medium: 38, large: 58, huge: 80 };
function getUsersSize(users) {
  const chartDom = document.getElementById('bubbleChart');
  const w = chartDom ? chartDom.clientWidth : 1200;
  const scale = Math.max(0.4, Math.min(1.2, w / 1200));
  return Math.round(USERS_BASE[users] * scale);
}

// ========== Overlap Resolution ==========
function resolveOverlaps(products) {
  const coords = products.map(p => ({ x: p.ai_core, y: p.buzz, ox: 0, oy: 0 }));
  const threshold = 0.8; // minimum distance in data units
  // Simple iterative push-apart
  for (let iter = 0; iter < 8; iter++) {
    for (let i = 0; i < coords.length; i++) {
      for (let j = i + 1; j < coords.length; j++) {
        const dx = (coords[j].x + coords[j].ox) - (coords[i].x + coords[i].ox);
        const dy = (coords[j].y + coords[j].oy) - (coords[i].y + coords[i].oy);
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < threshold) {
          const angle = Math.atan2(dy, dx) || (Math.PI / 4);
          const push = (threshold - dist) / 2 + 0.05;
          coords[i].ox -= Math.cos(angle) * push;
          coords[i].oy -= Math.sin(angle) * push;
          coords[j].ox += Math.cos(angle) * push;
          coords[j].oy += Math.sin(angle) * push;
        }
      }
    }
  }
  return coords;
}

// ========== View Switching ==========
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('tab-' + view).classList.add('active');
  if (view === 'chart') {
    setTimeout(() => chart && chart.resize(), 100);
  }
}

      min: 0, max: 10,
      splitLine: { lineStyle: { color: '#243447' } },
      axisLine: { lineStyle: { color: '#243447' }, symbol: ['none', 'arrow'], symbolSize: [8, 8] },
      axisLabel: { color: '#78909C', fontSize: 12 },
      axisTick: { show: false }
    },
    yAxis: {
      name: '讨论度 ↑',
      nameLocation: 'end', nameGap: 12,
      nameRotate: 0,
      nameTextStyle: { color: '#78909C', fontSize: 13, align: 'left', padding: [0, 0, 0, -40] },
      min: 0, max: 10,
      splitLine: { lineStyle: { color: '#243447' } },
      axisLine: { lineStyle: { color: '#243447' }, symbol: ['none', 'arrow'], symbolSize: [8, 8] },
      axisLabel: { color: '#78909C', fontSize: 12 },
      axisTick: { show: false }
    },
    tooltip: {
      trigger: 'item',
      backgroundColor: 'rgba(15,25,35,0.95)',
      borderColor: '#243447', borderWidth: 1,
      padding: [12, 16],
      textStyle: { color: '#B0BEC5', fontSize: 13 },
      formatter: function(params) {
        const p = params.data._product;
        const comments = getComments()[p.id] || [];
        const lastComment = comments.length > 0 ? comments[comments.length - 1] : null;
        let html = '<div style="max-width:280px">';
        html += '<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px">' + p.name + '</div>';
        html += '<div style="font-size:12px;color:#78909C;margin-bottom:8px">' + p.game + '</div>';
        html += '<div style="font-size:12px;color:#B0BEC5;margin-bottom:8px">' + p.desc + '</div>';
        html += '<div style="display:flex;gap:12px;font-size:11px;color:#78909C">';
        html += '<span>AI核心: <b style="color:#fff">' + p.ai_core + '</b></span>';
        html += '<span>讨论度: <b style="color:#fff">' + p.buzz + '</b></span>';
        html += '<span>用户量: <b style="color:#fff">' + USERS_LABEL[p.users] + '</b></span>';
        html += '</div>';
        if (lastComment) {
          html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #243447;font-size:12px;color:#78909C">';
          html += '💬 ' + lastComment.text.substring(0, 60) + (lastComment.text.length > 60 ? '...' : '');
          html += '</div>';
        }
        html += '<div style="margin-top:6px;font-size:11px;color:#4285F4">点击查看详情与评论 →</div>';
        html += '</div>';
        return html;
      }
    },
    series: [{
      type: 'scatter',
      data: seriesData,
      label: {
        show: true, position: 'top',
        formatter: function(params) { return params.data._product.name; },
        color: '#78909C', fontSize: 11, distance: 6
      },
      emphasis: {
        scale: 1.3,
        label: { color: '#FFFFFF', fontWeight: 'bold' }
      },
      animationDuration: 800, animationEasing: 'cubicOut'
    }]
  };

  chart.setOption(option);
  chart.on('click', function(params) {
    if (params.data && params.data._product) openCommentPanel(params.data._product);
  });
  window.addEventListener('resize', function() {
    if (!chart) return;
    chart.resize();
    // Recalculate bubble sizes on resize
    const newData = chart.getOption().series[0].data.map((d, i) => {
      d.symbolSize = getUsersSize(PRODUCTS[i].users);
      return d;
    });
    chart.setOption({ series: [{ data: newData }] });
  });
}

// ========== Product Table ==========
let tableSortField = null;
let tableSortDir = 'asc';

function renderProductTable(sortField, sortDir) {
  const tbody = document.getElementById('productTableBody');
  const comments = getComments();

  let sorted = [...PRODUCTS];
  if (sortField) {
    sorted.sort((a, b) => {
      let va, vb;
      if (sortField === 'users') {
        va = USERS_ORDER[a.users]; vb = USERS_ORDER[b.users];
      } else if (typeof a[sortField] === 'number') {
        va = a[sortField]; vb = b[sortField];
      } else {
        va = (a[sortField] || '').toString(); vb = (b[sortField] || '').toString();
        return sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      }
      return sortDir === 'asc' ? va - vb : vb - va;
    });
  }

  tbody.innerHTML = sorted.map(p => {
    const pComments = comments[p.id] || [];
    const lastComment = pComments.length > 0 ? pComments[pComments.length - 1] : null;
    const influenceBg = { small: 'rgba(120,144,156,0.2)', medium: 'rgba(120,144,156,0.3)', large: 'rgba(66,133,244,0.2)', huge: 'rgba(66,133,244,0.3)' };
    return '<tr>'
      + '<td class="td-name" data-label="产品名" onclick="openCommentPanel(PRODUCTS.find(x=>x.id===\'' + p.id + '\'))">' + p.name + '</td>'
      + '<td class="td-game" data-label="所属游戏">' + p.game + '</td>'
      + '<td class="td-num" data-label="AI核心">' + p.ai_core + '</td>'
      + '<td class="td-num td-buzz" data-label="讨论度">' + p.buzz + '</td>'
      + '<td class="td-num td-users" data-label="用户量"><span class="td-influence-badge" style="background:' + influenceBg[p.users] + '">' + USERS_LABEL[p.users] + '</span></td>'
      + '<td data-label="分类"><span class="td-type-dot" style="background:' + CAT_COLOR[p.category] + '"></span>' + CAT_LABEL[p.category] + '</td>'
      + '<td data-label="状态"><span class="td-status-badge" style="' + (p.status === 'released' ? 'color:#4CAF50' : 'color:#FF9800') + '">' + STATUS_LABEL[p.status] + '</span></td>'
      + '<td data-label="上线时间" style="white-space:nowrap;color:#78909C">' + (p.launch || '--') + '</td>'
      + '<td class="td-desc" data-label="简介">' + p.desc + '</td>'
      + '<td class="td-comment" data-label="最新评论">' + (lastComment ? '<span style="color:#78909C;font-size:11px">' + lastComment.time + '</span><br>' + escapeHtml(lastComment.text).substring(0, 80) + (lastComment.text.length > 80 ? '...' : '') : '<span style="color:#546E7A">暂无评论</span>') + '</td>'
      + '</tr>';
  }).join('');

  // Update header sort indicators
  document.querySelectorAll('.product-table th').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.sort === sortField) {
      th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
    }
  });
}

// Table header click sorting
document.getElementById('productTable').querySelector('thead').addEventListener('click', function(e) {
  const th = e.target.closest('th[data-sort]');
  if (!th) return;
  const field = th.dataset.sort;
  if (tableSortField === field) {
    tableSortDir = tableSortDir === 'asc' ? 'desc' : 'asc';
  } else {
    tableSortField = field;
    tableSortDir = th.dataset.type === 'number' || th.dataset.type === 'influence' ? 'desc' : 'asc';
  }
  renderProductTable(tableSortField, tableSortDir);
});

// ========== Comment Panel ==========
function openCommentPanel(product) {
  currentProduct = product;
  document.getElementById('commentProductName').textContent = product.name;
  document.getElementById('commentProductGame').textContent = product.game;

  const scoresHtml = [
    { label: 'AI核心', value: product.ai_core, color: '#4285F4' },
    { label: '讨论度', value: product.buzz, color: '#FF9800' },
    { label: '用户量', value: USERS_LABEL[product.users], color: '#4CAF50' },
    { label: '类型', value: CAT_LABEL[product.category], color: CAT_COLOR[product.category] },
    { label: '状态', value: STATUS_LABEL[product.status], color: product.status === 'released' ? '#4CAF50' : '#FF9800' }
  ].map(s =>
    '<span class="score-badge"><span class="dot" style="background:' + s.color + '"></span>' + s.label + ': ' + s.value + '</span>'
  ).join('');
  document.getElementById('commentScores').innerHTML = scoresHtml;

  // Image
  var imgEl = document.getElementById('commentImage');
  if (product.image) {
    imgEl.innerHTML = '<img src="' + product.image + '" alt="' + product.name + '" onerror="this.style.display=\'none\'">';
  } else {
    imgEl.innerHTML = '';
  }

  // Links
  var linksEl = document.getElementById('commentLinks');
  if (product.links && product.links.length > 0) {
    linksEl.innerHTML = product.links.map(function(l) {
      return '<a href="' + l.url + '" target="_blank" rel="noopener">'
        + l.title
        + (l.summary ? '<span class="link-summary"> — ' + l.summary + '</span>' : '')
        + '</a>';
    }).join('');
  } else {
    linksEl.innerHTML = '';
  }

  renderComments(product.id);
  document.getElementById('commentOverlay').classList.add('active');
  document.getElementById('commentPanel').classList.add('open');
  document.getElementById('commentInput').value = '';
}

function closeCommentPanel() {
  document.getElementById('commentOverlay').classList.remove('active');
  document.getElementById('commentPanel').classList.remove('open');
  currentProduct = null;
  // Refresh table to show updated comments
  renderProductTable(tableSortField, tableSortDir);
}

function renderComments(productId) {
  const comments = getComments()[productId] || [];
  const container = document.getElementById('commentList');
  if (comments.length === 0) {
    container.innerHTML = '<div class="comment-empty">还没有评论，写下你的第一条观察吧</div>';
    return;
  }
  container.innerHTML = [...comments].reverse().map((c, i) => {
    const realIndex = comments.length - 1 - i;
    return '<div class="comment-item">'
      + '<div class="comment-time">' + c.time + '</div>'
      + '<div class="comment-text">' + escapeHtml(c.text) + '</div>'
      + '<button class="comment-delete" onclick="deleteComment(\'' + productId + '\',' + realIndex + ')" title="删除">🗑</button>'
      + '</div>';
  }).join('');
}

function submitComment() {
  if (!currentProduct) return;
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;

  const comments = getComments();
  if (!comments[currentProduct.id]) comments[currentProduct.id] = [];
  const now = new Date();
  const timeStr = now.getFullYear() + '-'
    + String(now.getMonth()+1).padStart(2,'0') + '-'
    + String(now.getDate()).padStart(2,'0') + ' '
    + String(now.getHours()).padStart(2,'0') + ':'
    + String(now.getMinutes()).padStart(2,'0');
  comments[currentProduct.id].push({ text, time: timeStr });
  saveComments(comments);
  renderComments(currentProduct.id);
  input.value = '';
}

function deleteComment(productId, index) {
  const comments = getComments();
  if (comments[productId]) {
    comments[productId].splice(index, 1);
    saveComments(comments);
    renderComments(productId);
  }
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

document.getElementById('commentInput').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); submitComment(); }
});

// ========== Daily Report View ==========
function initReports() {
  const reports = (window.DAILY_REPORTS || []).slice().sort((a, b) => b.date.localeCompare(a.date));
  const sidebar = document.getElementById('reportSidebar');
  const select = document.getElementById('reportMobileSelect');
  const mobileNav = document.getElementById('reportMobileNav');

  if (reports.length === 0) {
    document.getElementById('reportContent').innerHTML =
      '<div class="report-empty"><div class="report-empty-icon">📰</div><div class="report-empty-text">暂无日报</div><div class="report-empty-sub">首期日报将在明天 9:00 自动生成</div></div>';
    return;
  }

  document.getElementById('lastUpdate').textContent = '最后更新：' + reports[0].date;
  const titleEl = sidebar.querySelector('.report-sidebar-title');
  sidebar.innerHTML = '';
  sidebar.appendChild(titleEl);

  reports.forEach((r, i) => {
    const date = new Date(r.date + 'T00:00:00');
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    const label = (date.getMonth()+1) + '-' + String(date.getDate()).padStart(2,'0') + ' 周' + weekdays[date.getDay()];

    const div = document.createElement('div');
    div.className = 'report-date-item' + (i === 0 ? ' active' : '');
    div.textContent = label;
    div.onclick = () => selectReport(r.date);
    div.dataset.date = r.date;
    sidebar.appendChild(div);

    const opt = document.createElement('option');
    opt.value = r.date;
    opt.textContent = r.date + ' 周' + weekdays[date.getDay()];
    if (i === 0) opt.selected = true;
    select.appendChild(opt);

    // Mobile date pill
    const pill = document.createElement('div');
    pill.className = 'date-pill' + (i === 0 ? ' active' : '');
    pill.textContent = label;
    pill.dataset.date = r.date;
    pill.onclick = function() { selectReport(r.date); };
    mobileNav.appendChild(pill);
  });
  selectReport(reports[0].date);
}

function toggleInsight(btn, id) {
  var box = document.getElementById(id);
  if (!box) return;
  var isOpen = box.classList.contains('show');
  box.classList.toggle('show');
  btn.classList.toggle('open');
}

function selectReport(date) {
  var reports = window.DAILY_REPORTS || [];
  var report = reports.find(function(r) { return r.date === date; });
  var contentEl = document.getElementById('reportContent');
  if (!report) {
    contentEl.innerHTML = '<div class="report-empty"><div class="report-empty-icon">📰</div><div class="report-empty-text">未找到该日报</div></div>';
    return;
  }
  contentEl.innerHTML = marked.parse(report.content);

  // Post-process: extract source info from each news item and render as meta bar under h3
  contentEl.querySelectorAll('h3').forEach(function(h3) {
    var nextEl = h3.nextElementSibling;
    if (!nextEl || nextEl.tagName !== 'UL') return;
    var items = Array.from(nextEl.querySelectorAll('li'));
    var sourceItem = items.find(function(li) { return li.textContent.includes('来源'); });
    if (!sourceItem) return;

    // Extract link URL, source name, and optional publish date + language
    var sourceLink = sourceItem.querySelector('a');
    var url = sourceLink ? sourceLink.getAttribute('href') : '';
    var sourceName = sourceLink ? sourceLink.textContent.trim() : '';
    // Parse pipe-separated fields: "| 2026-04-10 | 🇬🇧英文" or "| 2026-04-10"
    var rawText = sourceItem.textContent || '';
    var datePart = '';
    var langPart = '';
    var pipeIdx = rawText.indexOf('|');
    if (pipeIdx > -1) {
      var afterPipe = rawText.substring(pipeIdx + 1);
      var pipes = afterPipe.split('|');
      datePart = (pipes[0] || '').trim();
      if (pipes.length > 1) {
        langPart = (pipes[1] || '').trim();
      }
    }

    // Wrap h3 text in link
    var h3Html = h3.innerHTML;
    if (url) {
      h3.innerHTML = '<a href="' + url + '" target="_blank" rel="noopener">' + h3Html + '</a>';
    }

    // Build meta bar
    var metaHtml = '<div class="news-meta">';
    if (sourceName) {
      metaHtml += '<span class="news-source">' + sourceName + '</span>';
    }
    if (datePart) {
      metaHtml += '<span class="news-date">' + datePart + '</span>';
    }
    if (langPart) {
      metaHtml += '<span class="news-lang">' + langPart + '</span>';
    }
    metaHtml += '</div>';
    h3.insertAdjacentHTML('afterend', metaHtml);

    // Remove the source <li>
    sourceItem.remove();
    if (nextEl.children.length === 0) nextEl.remove();
  });

  // Post-process: convert "策划启发" li into collapsible toggle
  contentEl.querySelectorAll('h3').forEach(function(h3) {
    // Find the <ul> that follows (may be after meta bar now)
    var sibling = h3.nextElementSibling;
    var ul = null;
    while (sibling) {
      if (sibling.tagName === 'UL') { ul = sibling; break; }
      if (sibling.tagName === 'H3' || sibling.tagName === 'H2' || sibling.tagName === 'HR') break;
      sibling = sibling.nextElementSibling;
    }
    if (!ul) return;
    var items = Array.from(ul.querySelectorAll('li'));
    var insightItem = items.find(function(li) { return li.textContent.indexOf('策划启发') > -1; });
    if (!insightItem) return;

    // Extract insight text (remove the bold label prefix)
    var insightHtml = insightItem.innerHTML;
    insightHtml = insightHtml.replace(/^.*?策划启发.*?[：:]/, '').trim();

    // Create toggle button + collapsible box
    var uid = 'insight-' + Math.random().toString(36).substr(2, 8);
    var toggleHtml = '<div class="insight-toggle" onclick="toggleInsight(this,\'' + uid + '\')">'
      + '<span class="arrow">▶</span> 💡 策划启发</div>'
      + '<div class="insight-box" id="' + uid + '">' + insightHtml + '</div>';
    ul.insertAdjacentHTML('afterend', toggleHtml);

    // Remove the insight <li>
    insightItem.remove();
    if (ul.children.length === 0) ul.remove();
  });

  // Post-process: append generation time to blockquote
  var bq = contentEl.querySelector('blockquote');
  if (bq) {
    var timeStr = report.time || '09:00';
    bq.innerHTML += '<div style="text-align:right;color:#78909C;font-size:12px;margin-top:4px">生成于 ' + timeStr + '</div>';
  }

  // Post-process: ensure all links open in new tab (consistent behavior)
  contentEl.querySelectorAll('a').forEach(function(a) {
    if (a.getAttribute('href') && a.getAttribute('href').startsWith('http')) {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener');
    }
  });

  contentEl.parentElement.scrollTop = 0;
  document.querySelectorAll('.report-date-item').forEach(function(item) {
    item.classList.toggle('active', item.dataset.date === date);
  });
  document.getElementById('reportMobileSelect').value = date;
  // Sync mobile date nav pills
  document.querySelectorAll('.date-pill').forEach(function(pill) {
    pill.classList.toggle('active', pill.dataset.date === date);
    if (pill.dataset.date === date) {
      pill.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
    }
  });
}

// ========== Init ==========
function initAll() {
  initChart();
  renderProductTable(null, 'asc');
  initReports();
}
</script>
